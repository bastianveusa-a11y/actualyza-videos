name: Render & Schedule Videos

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Write video config
        env:
          CONFIG_JSON: ${{ toJson(github.event.client_payload.config) }}
        run: node -e "require('fs').writeFileSync('render-latest.json', process.env.CONFIG_JSON)"

      - name: Generate voiceover EN
        if: github.event.client_payload.lang == 'en' || github.event.client_payload.lang == 'both'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: LANG_TARGET=en node scripts/generate-audio.js

      - name: Generate voiceover ES
        if: github.event.client_payload.lang == 'es' || github.event.client_payload.lang == 'both'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: LANG_TARGET=es node scripts/generate-audio.js

      - name: Render EN
        if: github.event.client_payload.lang == 'en' || github.event.client_payload.lang == 'both'
        run: |
          SLUG="${{ github.event.client_payload.slug }}"
          node -e "
            const d = JSON.parse(require('fs').readFileSync('render-latest.json'));
            require('fs').writeFileSync('render-props-en.json', JSON.stringify(d.en));
          "
          npx remotion render src/index.ts AmyReel-EN out/${{ github.event.client_payload.slug }}-en.mp4 --props=render-props-en.json

      - name: Render ES
        if: github.event.client_payload.lang == 'es' || github.event.client_payload.lang == 'both'
        run: |
          node -e "
            const d = JSON.parse(require('fs').readFileSync('render-latest.json'));
            require('fs').writeFileSync('render-props-es.json', JSON.stringify(d.es));
          "
          npx remotion render src/index.ts AmyReel-ES out/${{ github.event.client_payload.slug }}-es.mp4 --props=render-props-es.json

      - name: Upload EN to Cloudinary & schedule Buffer
        if: github.event.client_payload.lang == 'en' || github.event.client_payload.lang == 'both'
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DAEMON_SECRET: ${{ secrets.DAEMON_SECRET }}
        run: |
          VIDEO_ID="${{ github.event.client_payload.video_id_en }}"
          FILE="out/${{ github.event.client_payload.slug }}-en.mp4"
          curl -s -X POST "$DASHBOARD_URL/publish/upload/$VIDEO_ID" \
            -H "X-Daemon-Key: $DAEMON_SECRET" \
            -F "file=@$FILE;type=video/mp4" | tee /tmp/upload-en.json
          cat /tmp/upload-en.json

      - name: Upload ES to Cloudinary & schedule Buffer
        if: github.event.client_payload.lang == 'es' || github.event.client_payload.lang == 'both'
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DAEMON_SECRET: ${{ secrets.DAEMON_SECRET }}
        run: |
          VIDEO_ID="${{ github.event.client_payload.video_id_es }}"
          FILE="out/${{ github.event.client_payload.slug }}-es.mp4"
          curl -s -X POST "$DASHBOARD_URL/publish/upload/$VIDEO_ID" \
            -H "X-Daemon-Key: $DAEMON_SECRET" \
            -F "file=@$FILE;type=video/mp4" | tee /tmp/upload-es.json
          cat /tmp/upload-es.json
